name: salix_ai
description: SALIX AI Personal — chat ChatGPT-style com SALIX + OSS gpt-oss-120b, voz premium XTTS-v2, wake word "Oi SALIX", multi-user, abre apps Android, anexos, câmera, controles nativos e rotinas.
publish_to: 'none'
version: 7.0.0+32

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  http: ^1.2.2
  shared_preferences: ^2.3.2
  speech_to_text: ^7.0.0
  flutter_tts: ^3.8.5
  audioplayers: ^6.0.0
  url_launcher: ^6.3.0
  android_intent_plus: ^5.1.0
  package_info_plus: ^8.0.2
  permission_handler: ^11.3.1
  uuid: ^4.4.0
  flutter_markdown: ^0.7.3
  cupertino_icons: ^1.0.8
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  http_parser: ^4.0.2
  # ---- Onda 4: device control + automação ----
  flutter_volume_controller: ^1.3.2
  screen_brightness: ^1.0.1
  torch_light: ^1.0.0
  vibration: ^2.0.0
  geolocator: ^13.0.1
  # ---- v7.0.0+32: persist all conversations locally + search ----
  sqflite: ^2.3.3
  path_provider: ^2.1.4
