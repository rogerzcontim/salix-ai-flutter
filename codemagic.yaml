workflows:
  ios-adhoc-unsigned:
    name: SALIX iOS Ad-Hoc (unsigned, sideload via AltStore)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: 3.27.4
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "ai.ironedge.salix"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: release/*
          include: true
    scripts:
      - name: Show env
        script: |
          set -e
          flutter --version
          xcodebuild -version
          pod --version
      - name: Flutter pub get
        script: |
          set -e
          flutter pub get
      - name: CocoaPods install
        script: |
          set -e
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
      - name: Build unsigned IPA
        script: |
          set -e
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/Runner.app
          zip -qr "../../../SalixAI_v1.4.0.ipa" Payload
          ls -la "../../../SalixAI_v1.4.0.ipa"
    artifacts:
      - SalixAI_v1.4.0.ipa
      - build/ios/iphoneos/Runner.app
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - rogerzcontim@gmail.com
        notify:
          success: true
          failure: true

  ios-adhoc-signed:
    name: SALIX iOS Signed Ad-Hoc (Apple Developer $99/yr required)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: 3.27.4
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: ai.ironedge.salix
      vars:
        BUNDLE_ID: "ai.ironedge.salix"
      groups:
        - apple_credentials
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true
    scripts:
      - name: Set up provisioning
        script: |
          xcode-project use-profiles
      - name: Flutter pub get
        script: flutter pub get
      - name: Pod install
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
      - name: Build IPA
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - rogerzcontim@gmail.com
